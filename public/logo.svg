<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.25)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" fill="url(#shineGrad)"/>
  
  <!-- Car body -->
  <path d="M55 120 L60 95 Q65 80 80 75 L120 75 Q135 80 140 95 L145 120" 
        stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Car roof / windshield -->
  <path d="M75 75 L80 58 Q85 50 100 50 Q115 50 120 58 L125 75" 
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Car base / chassis -->
  <line x1="42" y1="120" x2="158" y2="120" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Left wheel -->
  <circle cx="72" cy="120" r="14" fill="white" opacity="0.9"/>
  <circle cx="72" cy="120" r="7" fill="#2563eb"/>
  
  <!-- Right wheel -->
  <circle cx="128" cy="120" r="14" fill="white" opacity="0.9"/>
  <circle cx="128" cy="120" r="7" fill="#2563eb"/>
  
  <!-- Wrench icon (small, bottom-right corner) -->
  <g transform="translate(130, 130) rotate(-45) scale(0.7)">
    <path d="M5 0 L5 20 Q5 28 10 28 Q15 28 15 20 L15 0" 
          fill="white" opacity="0.9"/>
    <circle cx="10" cy="2" r="8" fill="none" stroke="white" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Shield checkmark (top-right accent) -->
  <g transform="translate(140, 30)">
    <path d="M15 5 Q15 2 18 2 L30 2 Q33 2 33 5 L33 18 Q33 25 24 30 Q15 25 15 18 Z" 
          fill="white" opacity="0.2"/>
    <polyline points="20,16 23,20 29,12" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>
</svg>
